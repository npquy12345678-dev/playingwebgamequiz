<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Siêu Trắc Nghiệm | Chọn khối - Chọn môn</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0b2b40 0%, #123b4d 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }
        /* container chính */
        .game-container {
            max-width: 1000px;
            width: 100%;
            background: #fef9e8;
            border-radius: 64px;
            box-shadow: 0 30px 45px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            transition: 0.2s;
        }
        /* header */
        .game-header {
            background: #1f5e3a;
            color: white;
            padding: 24px 30px;
            text-align: center;
        }
        .game-header h1 {
            font-size: 2rem;
            letter-spacing: -0.5px;
        }
        .game-header p {
            margin-top: 8px;
            opacity: 0.9;
        }
        /* khu vực cài đặt */
        .setup-panel {
            background: #fff6e8;
            padding: 30px;
            border-bottom: 2px solid #e2cba4;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 25px;
            align-items: flex-end;
        }
        .input-group {
            flex: 1;
            min-width: 180px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .input-group label {
            font-weight: 700;
            color: #2c4c3b;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        .input-group input, .input-group select {
            padding: 12px 16px;
            border-radius: 60px;
            border: 1px solid #cfb784;
            font-size: 1rem;
            background: white;
            cursor: pointer;
        }
        .btn-start {
            background: #1f5e3a;
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .btn-start:hover {
            background: #0f4529;
            transform: scale(0.98);
        }
        /* khu vực quiz */
        .quiz-area {
            background: #fffef7;
            padding: 20px 30px 30px;
        }
        .info-bar {
            display: flex;
            justify-content: space-between;
            background: #e9f1e6;
            padding: 12px 20px;
            border-radius: 60px;
            margin-bottom: 24px;
            font-weight: 600;
        }
        .student-badge {
            background: #1f5e3a;
            padding: 4px 18px;
            border-radius: 40px;
            color: white;
        }
        .score-badge {
            background: #2c4c3b;
            padding: 4px 18px;
            border-radius: 40px;
            color: white;
        }
        .question-card {
            background: white;
            border-radius: 48px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid #e6dcc8;
        }
        .question-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e3a2f;
            line-height: 1.4;
            margin-bottom: 28px;
        }
        .answers-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 30px;
        }
        .answer-option {
            background: #f7f3ea;
            border-radius: 100px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: 0.1s;
            border: 2px solid transparent;
        }
        .answer-option:hover {
            background: #ede5d7;
        }
        .answer-option.selected {
            background: #d9e6d4;
            border-color: #1f5e3a;
        }
        .prefix {
            background: #cbae7a;
            width: 40px;
            height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 40px;
            font-weight: 800;
            font-size: 1.2rem;
            color: #2c2c2c;
        }
        .answer-text {
            flex: 1;
            font-size: 1rem;
        }
        .feedback-correct {
            background: #c8f0d1 !important;
            border-color: #1f5e3a !important;
        }
        .feedback-wrong {
            background: #ffe0db !important;
            border-color: #c7362b !important;
        }
        .action-btns {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
        }
        .btn-submit, .btn-next {
            background: #1f5e3a;
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            color: white;
            cursor: pointer;
        }
        .btn-next {
            background: #2c6b4e;
        }
        .btn-submit:disabled, .btn-next:disabled {
            background: #a8bbaf;
            cursor: not-allowed;
        }
        .hidden {
            display: none;
        }
        .result-panel {
            text-align: center;
            padding: 40px;
            background: #fcf8ef;
            border-radius: 40px;
            margin-top: 20px;
        }
        .final-score {
            font-size: 3.2rem;
            font-weight: 800;
            color: #1f5e3a;
            margin: 20px 0;
        }
        .restart-btn, .exit-btn {
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: bold;
            margin: 12px 8px;
            border: none;
            cursor: pointer;
        }
        .restart-btn {
            background: #2c4c3b;
            color: white;
        }
        .exit-btn {
            background: #b1624b;
            color: white;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            padding: 16px;
            background: #e9ddcb;
            color: #5f4c2b;
        }
        @media (max-width: 650px) {
            .question-text { font-size: 1.2rem; }
            .game-container { border-radius: 32px; }
        }
    </style>
</head>
<body>
<div class="game-container" id="appContainer">
    <div class="game-header">
        <h1>📚 TRẮC NGHIỆM THÔNG MINH</h1>
        <p>Chọn khối + môn → hệ thống tự bốc 10 câu hỏi</p>
    </div>

    <!-- Bảng thiết lập ban đầu -->
    <div id="setupPanel">
        <div class="setup-panel">
            <div class="form-row">
                <div class="input-group">
                    <label>👤 TÊN CỦA BẠN</label>
                    <input type="text" id="studentName" placeholder="Ví dụ: Nguyễn Minh Anh" value="">
                </div>
                <div class="input-group">
                    <label>📘 KHỐI LỚP</label>
                    <select id="gradeSelect">
                        <option value="6">Khối 6</option>
                        <option value="7">Khối 7</option>
                        <option value="8">Khối 8</option>
                        <option value="9">Khối 9</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>📖 MÔN HỌC</label>
                    <select id="subjectSelect">
                        <option value="toan">Toán</option>
                        <option value="nguvan">Ngữ văn</option>
                        <option value="tienganh">Tiếng Anh</option>
                        <option value="khtn">KHTN (Khoa học TN)</option>
                        <option value="lichsu_dialy">Lịch sử & Địa lý</option>
                        <option value="gdcd">GDCD</option>
                        <option value="congnghe">Công nghệ</option>
                        <option value="tinhoc">Tin học</option>
                    </select>
                </div>
            </div>
            <div style="text-align: center;">
                <button class="btn-start" id="startGameBtn">🎯 BẮT ĐẦU LÀM BÀI</button>
            </div>
        </div>
    </div>

    <!-- Khu vực làm bài (ẩn ban đầu) -->
    <div id="quizArea" class="quiz-area hidden">
        <div class="info-bar">
            <span class="student-badge" id="studentNameDisplay">Học sinh: ...</span>
            <span class="score-badge" id="scoreDisplay">Điểm: 0/10</span>
        </div>
        <div class="question-card">
            <div class="question-text" id="questionText">Đang tải câu hỏi...</div>
            <div class="answers-list" id="answersContainer"></div>
            <div class="action-btns">
                <button class="btn-submit" id="submitBtn">✅ GỬI CÂU TRẢ LỜI</button>
                <button class="btn-next hidden" id="nextBtn">➡️ CÂU TIẾP THEO</button>
            </div>
        </div>
        <div style="margin-top: 12px; font-size: 0.8rem; text-align: center;" id="statusHint"></div>
    </div>

    <!-- Khu vực kết quả -->
    <div id="resultArea" class="result-panel hidden"></div>
    <footer>© Hệ thống lấy câu hỏi theo khối/môn | Mỗi lần chơi là một tổ hợp mới</footer>
</div>

<script>
    // -------------------- GLOBAL --------------------
    let fullQuestions = [];         // 100 câu từ json
    let selectedQuestions = [];     // 10 câu sau khi chọn random + xáo trộn
    let userAnswers = new Array(10).fill(null);   // lưu chỉ số đáp án đã chọn (0->3)
    let currentIndex = 0;           // 0 -> 9
    let quizActive = false;
    let currentGrade = "6";
    let currentSubject = "toan";
    let studentName = "";

    // DOM elements
    const setupPanel = document.getElementById('setupPanel');
    const quizArea = document.getElementById('quizArea');
    const resultArea = document.getElementById('resultArea');
    const startBtn = document.getElementById('startGameBtn');
    const gradeSelect = document.getElementById('gradeSelect');
    const subjectSelect = document.getElementById('subjectSelect');
    const studentNameInput = document.getElementById('studentName');
    const studentNameDisplay = document.getElementById('studentNameDisplay');
    const scoreDisplaySpan = document.getElementById('scoreDisplay');
    const questionTextDiv = document.getElementById('questionText');
    const answersContainer = document.getElementById('answersContainer');
    const submitBtn = document.getElementById('submitBtn');
    const nextBtn = document.getElementById('nextBtn');
    const statusHint = document.getElementById('statusHint');

    // Hàm tải JSON dựa trên khối và môn (file cùng thư mục)
    async function loadQuestionsByGradeSubject(grade, subject) {
        const fileMap = {
            'toan': `toan${grade}.json`,
            'nguvan': `nguvan${grade}.json`,
            'tienganh': `tienganh${grade}.json`,
            'khtn': `khtn${grade}.json`,
            'lichsu_dialy': `sudia${grade}.json`,
            'gdcd': `congdan${grade}.json`,
            'congnghe': `congnghe${grade}.json`,
            'tinhoc': `tinhoc${grade}.json`
        };
        const fileName = fileMap[subject];
        if (!fileName) throw new Error(`Không tìm thấy ánh xạ file cho môn ${subject}`);
        const resp = await fetch(fileName);
        if (!resp.ok) throw new Error(`Không thể tải file ${fileName} - kiểm tra đường dẫn`);
        const data = await resp.json();
        if (!data.cauhoi || !Array.isArray(data.cauhoi)) throw new Error("File JSON thiếu mảng cauhoi");
        return data.cauhoi;   // mảng 100 câu (hy vọng)
    }

    // Lấy ngẫu nhiên 10 câu: mỗi nhóm 10 câu (0-9,10-19,...,90-99) lấy ngẫu nhiên 1 câu
    function pickRandomQuestionsFromGroups(fullList) {
        if (!fullList || fullList.length !== 100) {
            console.warn("Dữ liệu không đủ 100 câu, chuyển sang chế độ chọn ngẫu nhiên thuần túy");
            const shuffled = [...fullList];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled.slice(0, 10);
        }
        const selected = [];
        for (let group = 0; group < 10; group++) {
            const start = group * 10;
            const end = start + 9;
            const groupItems = fullList.slice(start, end + 1);
            if (groupItems.length === 0) continue;
            const randIdx = Math.floor(Math.random() * groupItems.length);
            selected.push(groupItems[randIdx]);
        }
        // ** Xáo trộn thứ tự 10 câu một lần nữa **
        for (let i = selected.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [selected[i], selected[j]] = [selected[j], selected[i]];
        }
        return selected;
    }

    // Cập nhật điểm hiển thị
    function computeScore() {
        let correct = 0;
        for (let i = 0; i < selectedQuestions.length; i++) {
            const q = selectedQuestions[i];
            const userIdx = userAnswers[i];
            if (userIdx !== null && q.dap_an) {
                const letters = ['a', 'b', 'c', 'd'];
                const correctIdx = letters.indexOf(q.dap_an);
                if (userIdx === correctIdx) correct++;
            }
        }
        return correct;
    }
    function updateScoreUI() {
        const currentScore = computeScore();
        scoreDisplaySpan.innerText = `Điểm: ${currentScore} / ${selectedQuestions.length}`;
        return currentScore;
    }

    // Hiển thị câu hỏi hiện tại
    function renderCurrentQuestion() {
        if (!quizActive || currentIndex >= selectedQuestions.length) return;
        const q = selectedQuestions[currentIndex];
        if (!q) return;
        questionTextDiv.innerText = `${currentIndex+1}. ${q.de}`;
        const options = [
            { key: 'a', text: q.a },
            { key: 'b', text: q.b },
            { key: 'c', text: q.c },
            { key: 'd', text: q.d }
        ];
        answersContainer.innerHTML = '';
        options.forEach((opt, idx) => {
            const div = document.createElement('div');
            div.className = 'answer-option';
            if (userAnswers[currentIndex] === idx) div.classList.add('selected');
            div.setAttribute('data-idx', idx);
            div.innerHTML = `
                <span class="prefix">${opt.key.toUpperCase()}</span>
                <span class="answer-text">${opt.text}</span>
            `;
            div.addEventListener('click', (e) => {
                if (!quizActive) return;
                // nếu đã gửi câu này rồi (submitBtn bị disable) thì không cho chọn lại
                if (submitBtn.disabled === true && !nextBtn.classList.contains('hidden')) {
                    statusHint.innerText = "⚠️ Bạn đã trả lời câu này rồi, hãy chuyển sang câu tiếp theo.";
                    return;
                }
                // bỏ chọn các option khác
                document.querySelectorAll('.answer-option').forEach(el => el.classList.remove('selected'));
                div.classList.add('selected');
                userAnswers[currentIndex] = idx;
                statusHint.innerText = "📌 Đã chọn, nhấn 'GỬI CÂU TRẢ LỜI' để xác nhận.";
            });
            answersContainer.appendChild(div);
        });
        // kiểm tra nếu đã trả lời câu này trước đó (khi quay lại không có, nhưng an toàn)
        if (userAnswers[currentIndex] !== null && submitBtn.disabled === false) {
            // tình huống đã chọn nhưng chưa gửi? không, nhưng vẫn ổn
        }
        // reset trạng thái nút
        submitBtn.disabled = false;
        submitBtn.classList.remove('hidden');
        nextBtn.classList.add('hidden');
        statusHint.style.color = "#4b6a3b";
        statusHint.innerText = "✅ Hãy chọn đáp án và gửi.";
    }

    // Xử lý gửi đáp án, kiểm tra, hiển thị đúng/sai, giải thích
    function handleSubmitAnswer() {
        if (!quizActive) return;
        const selectedIdx = userAnswers[currentIndex];
        if (selectedIdx === null) {
            statusHint.innerText = "⚠️ Bạn chưa chọn đáp án nào!";
            statusHint.style.color = "#b1624b";
            return;
        }
        const q = selectedQuestions[currentIndex];
        const letters = ['a', 'b', 'c', 'd'];
        const correctLetter = q.dap_an;
        const correctIdx = letters.indexOf(correctLetter);
        const isCorrect = (selectedIdx === correctIdx);
        
        // Vô hiệu hoá sự kiện chọn trong lúc chấm
        const allOpts = document.querySelectorAll('.answer-option');
        allOpts.forEach(opt => opt.style.pointerEvents = 'none');
        
        // Tô màu đúng / sai
        allOpts.forEach((opt, idx) => {
            if (idx === correctIdx) {
                opt.classList.add('feedback-correct');
            }
            if (idx === selectedIdx && !isCorrect) {
                opt.classList.add('feedback-wrong');
            }
        });
        
        // hiện giải thích
        const explanation = q.giai_thich || (isCorrect ? "Chính xác!" : "Đáp án đúng đã được tô xanh.");
        if (isCorrect) {
            statusHint.innerHTML = `🎉 ĐÚNG! ${explanation}`;
            statusHint.style.color = "#1f5e3a";
        } else {
            statusHint.innerHTML = `❌ SAI! Đáp án đúng là ${correctLetter.toUpperCase()}. ${explanation}`;
            statusHint.style.color = "#c7362b";
        }
        // Ẩn nút gửi, hiện nút chuyển câu
        submitBtn.disabled = true;
        submitBtn.classList.add('hidden');
        nextBtn.classList.remove('hidden');
        // cập nhật điểm hiển thị
        updateScoreUI();
    }
    
    // Chuyển sang câu tiếp theo
    function goToNextQuestion() {
        if (!quizActive) return;
        if (currentIndex + 1 < selectedQuestions.length) {
            currentIndex++;
            // reset giao diện cho câu mới
            submitBtn.disabled = false;
            submitBtn.classList.remove('hidden');
            nextBtn.classList.add('hidden');
            // xóa class feedback khỏi các option (sẽ render lại)
            renderCurrentQuestion();
            statusHint.style.color = "#4b6a3b";
            statusHint.innerText = "✅ Hãy chọn đáp án và gửi.";
        } else {
            // kết thúc bài thi
            finishQuiz();
        }
    }
    
    // Kết thúc và hiển thị bảng kết quả
    function finishQuiz() {
        quizActive = false;
        const finalScore = computeScore();
        const total = selectedQuestions.length;
        let comment = "";
        if (finalScore === 10) comment = "🏆 TUYỆT VỜI! Bạn là học sinh xuất sắc.";
        else if (finalScore >= 8) comment = "👍 Giỏi! Kiến thức vững vàng.";
        else if (finalScore >= 6) comment = "📚 Khá, ôn tập thêm để đạt điểm tuyệt đối.";
        else if (finalScore >= 4) comment = "📖 Trung bình, cần chăm chỉ hơn.";
        else comment = "🌱 Cố gắng nhiều hơn, xem lại giải thích để tiến bộ.";
        
        resultArea.classList.remove('hidden');
        quizArea.classList.add('hidden');
        resultArea.innerHTML = `
            <h2>📊 KẾT QUẢ THI</h2>
            <div style="font-size: 1.4rem; margin-top: 12px;">Học sinh: ${studentName}</div>
            <div class="final-score">${finalScore} / ${total}</div>
            <p style="font-size: 1.1rem;">${comment}</p>
            <p><strong>Đánh giá năng lực:</strong> Bạn đã trả lời đúng ${finalScore}/${total} câu. 
            ${finalScore >= 7 ? 'Phát huy nhé!' : 'Hãy luyện tập thêm để nâng cao trình độ.'}</p>
            <div>
                <button class="restart-btn" id="restartGameBtn">🔄 CHƠI LẠI</button>
                <button class="exit-btn" id="exitGameBtn">🏠 THOÁT</button>
            </div>
        `;
        document.getElementById('restartGameBtn')?.addEventListener('click', () => resetAndShowSetup());
        document.getElementById('exitGameBtn')?.addEventListener('click', () => resetAndShowSetup());
    }
    
    function resetAndShowSetup() {
        // ẩn khu vực quiz/result, hiện setup
        quizArea.classList.add('hidden');
        resultArea.classList.add('hidden');
        setupPanel.classList.remove('hidden');
        selectedQuestions = [];
        userAnswers.fill(null);
        currentIndex = 0;
        quizActive = false;
    }
    
    // KHỞI ĐỘNG GAME (sau khi bấm nút bắt đầu)
    async function initGame() {
        const rawName = studentNameInput.value.trim();
        if (rawName === "") {
            alert("Vui lòng nhập tên của bạn!");
            return;
        }
        studentName = rawName;
        currentGrade = gradeSelect.value;
        currentSubject = subjectSelect.value;
        studentNameDisplay.innerText = `Học sinh: ${studentName}`;
        
        try {
            startBtn.disabled = true;
            startBtn.innerText = "⏳ Đang tải ngân hàng đề...";
            // 1. Tải toàn bộ câu hỏi
            fullQuestions = await loadQuestionsByGradeSubject(currentGrade, currentSubject);
            if (!fullQuestions || fullQuestions.length < 10) throw new Error("Dữ liệu câu hỏi không đủ");
            // 2. Chọn 10 câu ngẫu nhiên từ các nhóm
            let tempSelected = pickRandomQuestionsFromGroups(fullQuestions);
            if (tempSelected.length < 10) tempSelected = fullQuestions.slice(0,10);
            selectedQuestions = tempSelected;
            // 3. Reset mảng đáp án
            userAnswers.fill(null);
            currentIndex = 0;
            quizActive = true;
            // 4. Ẩn setup, hiện quiz
            setupPanel.classList.add('hidden');
            quizArea.classList.remove('hidden');
            resultArea.classList.add('hidden');
            // 5. Render câu đầu
            renderCurrentQuestion();
            updateScoreUI();
            statusHint.innerText = "✅ Chọn đáp án và bấm GỬI.";
        } catch (err) {
            console.error(err);
            alert("Lỗi tải dữ liệu: " + err.message + "\nHãy chắc chắn file .json nằm cùng thư mục với file HTML.");
        } finally {
            startBtn.disabled = false;
            startBtn.innerText = "🎯 BẮT ĐẦU LÀM BÀI";
        }
    }
    
    // Gắn sự kiện
    startBtn.addEventListener('click', initGame);
    submitBtn.addEventListener('click', handleSubmitAnswer);
    nextBtn.addEventListener('click', goToNextQuestion);
    
    // Khởi tạo ẩn quiz, chỉ hiện setup
    resetAndShowSetup();
</script>
</body>
</html>
