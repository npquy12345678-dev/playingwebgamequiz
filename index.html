<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Siêu Trắc Nghiệm | Hệ thống kiểm tra kiến thức</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', system-ui, 'Segoe UI', 'Roboto', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f0f7ff 0%, #e9eef5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        /* Container chính */
        .game-container {
            max-width: 1000px;
            width: 100%;
            background: #ffffff;
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.1), 0 2px 5px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Header */
        .game-header {
            background: linear-gradient(135deg, #2c3e66 0%, #1a2c4a 100%);
            color: white;
            padding: 32px 32px;
            text-align: center;
            position: relative;
        }

        .game-header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .game-header p {
            font-size: 1rem;
            opacity: 0.9;
            font-weight: 400;
        }

        /* Khu vực cài đặt */
        .setup-panel {
            background: #fefefe;
            padding: 32px 32px 40px;
            border-bottom: 1px solid #eef2f8;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            margin-bottom: 32px;
            align-items: flex-end;
        }

        .input-group {
            flex: 1;
            min-width: 180px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-group label {
            font-weight: 600;
            color: #2c3e66;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        .input-group input, .input-group select {
            padding: 14px 18px;
            border-radius: 30px;
            border: 1.5px solid #e2e8f0;
            font-size: 0.95rem;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            color: #1a2c4a;
        }

        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }

        .btn-start {
            background: linear-gradient(135deg, #1e3a5f 0%, #2c4c7a 100%);
            border: none;
            padding: 14px 32px;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
            width: 100%;
            margin-top: 8px;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            background: linear-gradient(135deg, #143049 0%, #1e3b5e 100%);
        }

        /* Khu vực quiz */
        .quiz-area {
            background: #ffffff;
            padding: 28px 32px 32px;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8fafd;
            padding: 12px 24px;
            border-radius: 50px;
            margin-bottom: 32px;
            border: 1px solid #eef2f8;
            flex-wrap: wrap;
            gap: 12px;
        }

        .student-badge {
            background: #2c3e66;
            padding: 6px 22px;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
        }

        .score-badge {
            background: #eef2ff;
            padding: 6px 22px;
            border-radius: 40px;
            color: #1e3a5f;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .question-card {
            background: #ffffff;
            border-radius: 40px;
            padding: 8px 8px 24px 8px;
        }

        .question-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f2b3d;
            line-height: 1.4;
            margin-bottom: 32px;
            padding: 8px 12px;
            background: #fbfdff;
            border-radius: 32px;
        }

        .answers-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 36px;
        }

        .answer-option {
            background: #fafcff;
            border-radius: 80px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1.5px solid #e2edf7;
        }

        .answer-option:hover {
            background: #f0f6fe;
            border-color: #b9d0f0;
            transform: translateX(5px);
        }

        .answer-option.selected {
            background: #e6f0ff;
            border-color: #2c7da0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .prefix {
            background: #d9e6f5;
            width: 44px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.2rem;
            color: #1a4972;
            transition: 0.1s;
        }

        .selected .prefix {
            background: #2c7da0;
            color: white;
        }

        .answer-text {
            flex: 1;
            font-size: 1rem;
            font-weight: 500;
            color: #2c3e66;
            line-height: 1.3;
        }

        .feedback-correct {
            background: #dff0e4 !important;
            border-color: #2c7840 !important;
        }
        .feedback-correct .prefix {
            background: #2c7840 !important;
            color: white !important;
        }

        .feedback-wrong {
            background: #ffe6e2 !important;
            border-color: #c7362b !important;
        }
        .feedback-wrong .prefix {
            background: #c7362b !important;
            color: white !important;
        }

        .action-btns {
            display: flex;
            justify-content: flex-end;
            gap: 18px;
        }

        .btn-submit, .btn-next {
            background: #2c3e66;
            border: none;
            padding: 12px 32px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.95rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .btn-next {
            background: #2c7da0;
        }

        .btn-submit:hover, .btn-next:hover {
            filter: brightness(1.05);
            transform: translateY(-1px);
        }

        .btn-submit:disabled, .btn-next:disabled {
            background: #b9cadf;
            cursor: not-allowed;
            transform: none;
        }

        .hidden {
            display: none;
        }

        /* Kết quả */
        .result-panel {
            text-align: center;
            padding: 40px 28px;
            background: #fbfdff;
            border-radius: 40px;
            margin: 20px 28px 28px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            border: 1px solid #eef2f8;
        }

        .final-score {
            font-size: 3.6rem;
            font-weight: 800;
            color: #1e5e3a;
            margin: 20px 0;
            letter-spacing: -1px;
        }

        .restart-btn, .exit-btn {
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 700;
            margin: 12px 10px;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }

        .restart-btn {
            background: #2c3e66;
            color: white;
        }

        .exit-btn {
            background: #6c757d;
            color: white;
        }

        .restart-btn:hover, .exit-btn:hover {
            filter: brightness(1.03);
            transform: translateY(-1px);
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            padding: 16px;
            background: #f8fafd;
            color: #7890b0;
            border-top: 1px solid #eef2f8;
        }

        @media (max-width: 680px) {
            .question-text { font-size: 1.2rem; }
            .game-container { border-radius: 32px; }
            .setup-panel, .quiz-area { padding: 20px; }
        }
    </style>
</head>
<body>
<div class="game-container" id="appContainer">
    <div class="game-header">
        <h1>📚 SIÊU TRẮC NGHIỆM</h1>
        <p>Chọn khối + môn • Hệ thống tự bốc 10 câu đặc sắc</p>
    </div>

    <!-- Bảng thiết lập ban đầu -->
    <div id="setupPanel">
        <div class="setup-panel">
            <div class="form-row">
                <div class="input-group">
                    <label>👤 TÊN HỌC SINH</label>
                    <input type="text" id="studentName" placeholder="VD: Nguyễn Minh Anh" value="">
                </div>
                <div class="input-group">
                    <label>📘 KHỐI LỚP</label>
                    <select id="gradeSelect">
                        <option value="6">Khối 6</option>
                        <option value="7">Khối 7</option>
                        <option value="8">Khối 8</option>
                        <option value="9">Khối 9</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>📖 MÔN HỌC</label>
                    <select id="subjectSelect">
                        <option value="toan">Toán</option>
                        <option value="nguvan">Ngữ văn</option>
                        <option value="tienganh">Tiếng Anh</option>
                        <option value="khtn">KHTN (Khoa học TN)</option>
                        <option value="lichsu_dialy">Lịch sử & Địa lý</option>
                        <option value="gdcd">GDCD</option>
                        <option value="congnghe">Công nghệ</option>
                        <option value="tinhoc">Tin học</option>
                    </select>
                </div>
            </div>
            <div style="text-align: center;">
                <button class="btn-start" id="startGameBtn">🎯 BẮT ĐẦU LÀM BÀI</button>
            </div>
        </div>
    </div>

    <!-- Khu vực làm bài (ẩn ban đầu) -->
    <div id="quizArea" class="quiz-area hidden">
        <div class="info-bar">
            <span class="student-badge" id="studentNameDisplay">Học sinh: ...</span>
            <span class="score-badge" id="scoreDisplay">Điểm: 0/10</span>
        </div>
        <div class="question-card">
            <div class="question-text" id="questionText">📌 Đang tải câu hỏi...</div>
            <div class="answers-list" id="answersContainer"></div>
            <div class="action-btns">
                <button class="btn-submit" id="submitBtn">✅ GỬI CÂU TRẢ LỜI</button>
                <button class="btn-next hidden" id="nextBtn">➡️ CÂU TIẾP THEO</button>
            </div>
        </div>
        <div style="margin-top: 16px; font-size: 0.8rem; text-align: center; padding: 6px; background: #f9fbfe; border-radius: 50px;" id="statusHint"></div>
    </div>

    <!-- Khu vực kết quả -->
    <div id="resultArea" class="result-panel hidden"></div>
    <footer>© Hệ thống ngân hàng đề theo khối lớp | Tổ hợp câu hỏi mới mỗi lần chơi</footer>
</div>

<script>
    // -------------------- GLOBAL --------------------
    let fullQuestions = [];         // 100 câu từ json
    let selectedQuestions = [];     // 10 câu đã chọn + xáo trộn
    let userAnswers = new Array(10).fill(null);   // lưu chỉ số đáp án đã chọn (0->3)
    let currentIndex = 0;           
    let quizActive = false;
    let currentGrade = "6";
    let currentSubject = "toan";
    let studentName = "";

    // DOM elements
    const setupPanel = document.getElementById('setupPanel');
    const quizArea = document.getElementById('quizArea');
    const resultArea = document.getElementById('resultArea');
    const startBtn = document.getElementById('startGameBtn');
    const gradeSelect = document.getElementById('gradeSelect');
    const subjectSelect = document.getElementById('subjectSelect');
    const studentNameInput = document.getElementById('studentName');
    const studentNameDisplay = document.getElementById('studentNameDisplay');
    const scoreDisplaySpan = document.getElementById('scoreDisplay');
    const questionTextDiv = document.getElementById('questionText');
    const answersContainer = document.getElementById('answersContainer');
    const submitBtn = document.getElementById('submitBtn');
    const nextBtn = document.getElementById('nextBtn');
    const statusHint = document.getElementById('statusHint');

    // Hàm tải JSON dựa trên khối và môn (file cùng thư mục)
    async function loadQuestionsByGradeSubject(grade, subject) {
        const fileMap = {
            'toan': `toan${grade}.json`,
            'nguvan': `nguvan${grade}.json`,
            'tienganh': `tienganh${grade}.json`,
            'khtn': `khtn${grade}.json`,
            'lichsu_dialy': `sudia${grade}.json`,
            'gdcd': `congdan${grade}.json`,
            'congnghe': `congnghe${grade}.json`,
            'tinhoc': `tinhoc${grade}.json`
        };
        const fileName = fileMap[subject];
        if (!fileName) throw new Error(`Không tìm thấy ánh xạ file cho môn ${subject}`);
        const resp = await fetch(fileName);
        if (!resp.ok) throw new Error(`Không thể tải file ${fileName} - Kiểm tra đường dẫn hoặc file có tồn tại`);
        const data = await resp.json();
        if (!data.cauhoi || !Array.isArray(data.cauhoi)) throw new Error("File JSON thiếu mảng cauhoi");
        return data.cauhoi;   // mảng 100 câu
    }

    // Lấy ngẫu nhiên 10 câu: mỗi nhóm 10 câu (id: 1-10,11-20,...,91-100) lấy ngẫu nhiên 1 câu
    function pickRandomQuestionsFromGroups(fullList) {
        if (!fullList || fullList.length !== 100) {
            console.warn("Dữ liệu không đủ 100 câu, chuyển sang chế độ chọn ngẫu nhiên thuần túy");
            const shuffled = [...fullList];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled.slice(0, 10);
        }
        const selected = [];
        for (let group = 0; group < 10; group++) {
            const start = group * 10;
            const end = start + 9;
            const groupItems = fullList.slice(start, end + 1);
            if (groupItems.length === 0) continue;
            const randIdx = Math.floor(Math.random() * groupItems.length);
            selected.push(groupItems[randIdx]);
        }
        // ** Xáo trộn thứ tự 10 câu một lần nữa **
        for (let i = selected.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [selected[i], selected[j]] = [selected[j], selected[i]];
        }
        return selected;
    }

    // Cập nhật điểm hiển thị
    function computeScore() {
        let correct = 0;
        for (let i = 0; i < selectedQuestions.length; i++) {
            const q = selectedQuestions[i];
            const userIdx = userAnswers[i];
            if (userIdx !== null && q.dap_an) {
                const letters = ['a', 'b', 'c', 'd'];
                const correctIdx = letters.indexOf(q.dap_an);
                if (userIdx === correctIdx) correct++;
            }
        }
        return correct;
    }
    function updateScoreUI() {
        const currentScore = computeScore();
        scoreDisplaySpan.innerText = `Điểm: ${currentScore} / ${selectedQuestions.length}`;
        return currentScore;
    }

    // Hiển thị câu hỏi hiện tại
    function renderCurrentQuestion() {
        if (!quizActive || currentIndex >= selectedQuestions.length) return;
        const q = selectedQuestions[currentIndex];
        if (!q) return;
        questionTextDiv.innerText = `${currentIndex+1}. ${q.de}`;
        const options = [
            { key: 'a', text: q.a },
            { key: 'b', text: q.b },
            { key: 'c', text: q.c },
            { key: 'd', text: q.d }
        ];
        answersContainer.innerHTML = '';
        options.forEach((opt, idx) => {
            const div = document.createElement('div');
            div.className = 'answer-option';
            if (userAnswers[currentIndex] === idx) div.classList.add('selected');
            div.setAttribute('data-idx', idx);
            div.innerHTML = `
                <span class="prefix">${opt.key.toUpperCase()}</span>
                <span class="answer-text">${opt.text}</span>
            `;
            div.addEventListener('click', (e) => {
                if (!quizActive) return;
                if (submitBtn.disabled === true && !nextBtn.classList.contains('hidden')) {
                    statusHint.innerText = "⚠️ Bạn đã trả lời câu này rồi, hãy chuyển sang câu tiếp theo.";
                    return;
                }
                document.querySelectorAll('.answer-option').forEach(el => el.classList.remove('selected'));
                div.classList.add('selected');
                userAnswers[currentIndex] = idx;
                statusHint.innerText = "📌 Đã chọn đáp án, nhấn 'GỬI CÂU TRẢ LỜI' để xác nhận.";
                statusHint.style.color = "#2c7da0";
            });
            answersContainer.appendChild(div);
        });
        submitBtn.disabled = false;
        submitBtn.classList.remove('hidden');
        nextBtn.classList.add('hidden');
        statusHint.style.color = "#4b6a3b";
        statusHint.innerText = "✅ Hãy chọn một đáp án và gửi bài.";
    }

    // Xử lý gửi đáp án, kiểm tra, hiển thị đúng/sai, giải thích
    function handleSubmitAnswer() {
        if (!quizActive) return;
        const selectedIdx = userAnswers[currentIndex];
        if (selectedIdx === null) {
            statusHint.innerText = "⚠️ Bạn chưa chọn đáp án nào!";
            statusHint.style.color = "#c7362b";
            return;
        }
        const q = selectedQuestions[currentIndex];
        const letters = ['a', 'b', 'c', 'd'];
        const correctLetter = q.dap_an;
        const correctIdx = letters.indexOf(correctLetter);
        const isCorrect = (selectedIdx === correctIdx);
        
        const allOpts = document.querySelectorAll('.answer-option');
        allOpts.forEach(opt => opt.style.pointerEvents = 'none');
        
        allOpts.forEach((opt, idx) => {
            if (idx === correctIdx) {
                opt.classList.add('feedback-correct');
            }
            if (idx === selectedIdx && !isCorrect) {
                opt.classList.add('feedback-wrong');
            }
        });
        
        const explanation = q.giai_thich || (isCorrect ? "Chính xác!" : "Đáp án đúng đã được tô xanh.");
        if (isCorrect) {
            statusHint.innerHTML = `🎉 ĐÚNG! ${explanation}`;
            statusHint.style.color = "#1f5e3a";
        } else {
            statusHint.innerHTML = `❌ SAI! Đáp án đúng là ${correctLetter.toUpperCase()}. ${explanation}`;
            statusHint.style.color = "#c7362b";
        }
        submitBtn.disabled = true;
        submitBtn.classList.add('hidden');
        nextBtn.classList.remove('hidden');
        updateScoreUI();
    }
    
    // Chuyển sang câu tiếp theo
    function goToNextQuestion() {
        if (!quizActive) return;
        if (currentIndex + 1 < selectedQuestions.length) {
            currentIndex++;
            submitBtn.disabled = false;
            submitBtn.classList.remove('hidden');
            nextBtn.classList.add('hidden');
            renderCurrentQuestion();
            statusHint.style.color = "#4b6a3b";
            statusHint.innerText = "✅ Hãy chọn đáp án và gửi.";
        } else {
            finishQuiz();
        }
    }
    
    // Kết thúc và hiển thị bảng kết quả
    function finishQuiz() {
        quizActive = false;
        const finalScore = computeScore();
        const total = selectedQuestions.length;
        let comment = "";
        if (finalScore === 10) comment = "🏆 TUYỆT VỜI! Kiến thức hoàn hảo.";
        else if (finalScore >= 8) comment = "👍 GIỎI! Nắm vững kiến thức trọng tâm.";
        else if (finalScore >= 6) comment = "📚 KHÁ, hãy củng cố thêm một chút.";
        else if (finalScore >= 4) comment = "📖 TRUNG BÌNH, cần chăm chỉ luyện tập hơn.";
        else comment = "🌱 CỐ GẮNG! Xem lại giải thích để tiến bộ nhanh hơn.";
        
        resultArea.classList.remove('hidden');
        quizArea.classList.add('hidden');
        resultArea.innerHTML = `
            <h2>📊 KẾT QUẢ BÀI THI</h2>
            <div style="font-size: 1.2rem; margin-top: 12px; font-weight: 500;">Học sinh: ${studentName}</div>
            <div class="final-score">${finalScore} / ${total}</div>
            <p style="font-size: 1rem; max-width: 80%; margin: 0 auto;">${comment}</p>
            <p style="margin-top: 20px;"><strong>Đánh giá năng lực:</strong> Bạn trả lời đúng ${finalScore}/${total} câu. 
            ${finalScore >= 7 ? 'Phát huy nhé!' : 'Hãy luyện tập thêm để nâng cao kiến thức.'}</p>
            <div>
                <button class="restart-btn" id="restartGameBtn">🔄 LÀM LẠI</button>
                <button class="exit-btn" id="exitGameBtn">🏠 THOÁT</button>
            </div>
        `;
        document.getElementById('restartGameBtn')?.addEventListener('click', () => resetAndShowSetup());
        document.getElementById('exitGameBtn')?.addEventListener('click', () => resetAndShowSetup());
    }
    
    function resetAndShowSetup() {
        quizArea.classList.add('hidden');
        resultArea.classList.add('hidden');
        setupPanel.classList.remove('hidden');
        selectedQuestions = [];
        userAnswers.fill(null);
        currentIndex = 0;
        quizActive = false;
        statusHint.innerText = "";
    }
    
    // KHỞI ĐỘNG GAME (sau khi bấm nút bắt đầu)
    async function initGame() {
        const rawName = studentNameInput.value.trim();
        if (rawName === "") {
            alert("Vui lòng nhập tên của bạn!");
            return;
        }
        studentName = rawName;
        currentGrade = gradeSelect.value;
        currentSubject = subjectSelect.value;
        studentNameDisplay.innerText = `Học sinh: ${studentName}`;
        
        try {
            startBtn.disabled = true;
            startBtn.innerText = "⏳ Đang tải ngân hàng đề...";
            fullQuestions = await loadQuestionsByGradeSubject(currentGrade, currentSubject);
            if (!fullQuestions || fullQuestions.length < 10) throw new Error("Dữ liệu câu hỏi không đủ");
            let tempSelected = pickRandomQuestionsFromGroups(fullQuestions);
            if (tempSelected.length < 10) tempSelected = fullQuestions.slice(0,10);
            selectedQuestions = tempSelected;
            userAnswers.fill(null);
            currentIndex = 0;
            quizActive = true;
            setupPanel.classList.add('hidden');
            quizArea.classList.remove('hidden');
            resultArea.classList.add('hidden');
            renderCurrentQuestion();
            updateScoreUI();
            statusHint.innerText = "✅ Chọn đáp án và bấm GỬI.";
        } catch (err) {
            console.error(err);
            alert("Lỗi tải dữ liệu: " + err.message + "\nHãy chắc chắn file .json nằm cùng thư mục với file HTML.");
        } finally {
            startBtn.disabled = false;
            startBtn.innerText = "🎯 BẮT ĐẦU LÀM BÀI";
        }
    }
    
    // Gắn sự kiện
    startBtn.addEventListener('click', initGame);
    submitBtn.addEventListener('click', handleSubmitAnswer);
    nextBtn.addEventListener('click', goToNextQuestion);
    
    resetAndShowSetup();
</script>
</body>
</html>
